spring.application.name=gcpCollector
server.port=8095

# Spring Batch Job enable
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/cost?autoReconnect=true&allowMultiQueries=true&useSSL=false&rewriteBatchedStatements=true
spring.datasource.username=mcmpcostopti
spring.datasource.password=0000

# MyBatis
mybatis.mapper-locations=classpath:/mapper/**/*_SQL.xml

# Scheduler
gcpBillingCronSchedule=0 0 8 * * ?

# Alarm Service
costopti.alarmservice.url=${ALARM_SERVICE:alarm_service}

# GCP BigQuery
gcp.project-id=${GCP_PROJECT_ID:}
gcp.client-email=${GCP_CLIENT_EMAIL:}
gcp.private-key-id=${GCP_PRIVATE_KEY_ID:}
gcp.private-key=${GCP_PRIVATE_KEY:}
gcp.dataset=${GCP_BQ_DATASET:}
gcp.table=${GCP_BQ_TABLE:}
